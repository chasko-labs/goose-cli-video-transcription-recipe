services:
  whisper:
    build:
      context: ./docker
      dockerfile: whisper-rocm.Dockerfile
    container_name: transcribe-whisper
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    group_add:
      - video
      - render
    volumes:
      - ./media/videos:/media/videos
      - ./media/audio:/media/audio
      - ./media/frames:/media/frames
      - ./media/transcripts:/media/transcripts
    environment:
      - HSA_OVERRIDE_GFX_VERSION=10.3.0
      - PYTORCH_ALLOC_CONF=expandable_segments:True
      - SCENE_THRESHOLD=0.4
    networks:
      - heraldstack

  vision:
    build:
      context: ./docker
      dockerfile: vision-rocm.Dockerfile
    container_name: transcribe-vision
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    group_add:
      - video
      - render
    volumes:
      - ./media/frames:/media/frames
      - ./media/transcripts:/media/transcripts
      - hf-cache:/cache/huggingface
    environment:
      - HSA_OVERRIDE_GFX_VERSION=10.3.0
      - PYTORCH_ALLOC_CONF=expandable_segments:True
      - VISION_MODEL=amd/Instella-VL-1B
    networks:
      - heraldstack

networks:
  heraldstack:
    external: true

volumes:
  hf-cache:
