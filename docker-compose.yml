services:
  whisper:
    build:
      context: ./docker
      dockerfile: whisper-rocm.Dockerfile
    container_name: transcribe-whisper
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    group_add:
      - video
      - render
    volumes:
      - ./media/videos:/media/videos
      - ./media/audio:/media/audio
      - ./media/frames:/media/frames
      - ./media/transcripts:/media/transcripts
    environment:
      - HSA_OVERRIDE_GFX_VERSION=10.3.0
      - PYTORCH_ALLOC_CONF=expandable_segments:True
      - SCENE_THRESHOLD=0.4
    networks:
      - heraldstack

networks:
  heraldstack:
    external: true
