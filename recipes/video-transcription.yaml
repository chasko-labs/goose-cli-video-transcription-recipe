version: 1.1.0
title: video + podcast transcription pipeline
description: |
  5-stage pipeline with tightener: extract media (fc-pool microvm or docker fallback),
  transcribe audio with whisper gpu, analyze keyframes with instella-vl-1b gpu,
  tighten transcript (filler removal), merge into timestamped document, generate
  narrative via ollama, tighten narrative prose. supports video urls, podcast rss
  episode urls, and direct audio files. auto-detects audio-only content.
  outputs: ~/video-transcripts/<url-slug>/ on rocm-aibox.
instructions: |
  # role
  You are the pipeline dispatcher for the goose-cli video transcription recipe.
  Run the pipeline script and report results.

  # steps
  1. Run the pipeline on rocm-aibox:
     ```
     ssh rocm-aibox "bash ~/code/projects/goose-cli-video-transcription-recipe/scripts/transcribe-headless.sh --url '{{ video_url }}' --stage whisper {{ extra_flags }}"
     ```
     transcribe-headless.sh is thin glue — it validates fc-pool reachability then
     delegates to `hs-transcribe run`. all stage logic, gpu_lock, docker lifecycle,
     and status.json writes are owned by fc-pool /transcribe/* endpoints.
  2. Wait for it to complete. hs-transcribe emits structured json to stdout and
     progress lines to stderr. key stderr markers:
     - `[transcribe] dispatching to hs-transcribe` — preflight passed, handed off
     - stage progress comes from hs-transcribe itself (see fc-pool docs)
  3. Capture output paths from the json response on stdout (fields: combined_path, narrative_path, slug, base).
  4. Report back with:
     - the per-video slug and base prefix
     - full path to combined.md and the narrative
     - whether audio-only was detected
     - brief summary of what the content covered (from the narrative)

  # batch mode
  For multiple URLs, pass a manifest file (one URL per line) to batch.sh:
  ```
  ssh rocm-aibox "bash ~/code/projects/goose-cli-video-transcription-recipe/scripts/batch.sh --manifest /path/to/urls.txt --max-parallel 2"
  ```
  batch.sh delegates to `hs-transcribe batch`. add `--watch` to tail job status.
  Report the job-id and summary table from hs-transcribe output.

  # monitoring
  - poll status: `ssh rocm-aibox "cat ~/video-transcripts/<slug>/status.json"`
  - view traces: http://rocm-aibox.local:16686 (jaeger ui)

  # narrowing
  Do not modify any files. Do not re-run stages that already completed (resume is automatic).
  If the script fails at a stage, report the error verbatim — do not retry.

parameters:
  - key: video_url
    input_type: string
    requirement: required
    description: URL of the video or podcast to transcribe (youtube, direct mp3, any yt-dlp source)
  - key: extra_flags
    input_type: string
    requirement: optional
    default: ""
    description: "additional flags passed through to hs-transcribe: --force --dry-run --stage vision"

extensions:
  - type: builtin
    name: developer
    timeout: 1800

settings:
  goose_provider: openai
  goose_model: llama3.1:8b
  temperature: 0.1

prompt: |
  Transcribe and analyze this content: {{ video_url }}
  Extra flags: {{ extra_flags }}
  Run the full pipeline and report the output paths and a brief summary.
