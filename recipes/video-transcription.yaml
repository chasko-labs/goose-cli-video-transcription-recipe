version: 1.1.0
title: video transcription + frame analysis
description: |
  Full 4-stage pipeline: extract media (yt-dlp + ffmpeg via firecracker VM or docker fallback),
  transcribe audio with whisper GPU, analyze keyframes with Instella-VL-1B GPU, merge into
  a combined timestamped document, and generate a narrative via Ollama. Outputs land at
  ~/video-transcripts/<url-slug>/ on rocm-aibox.
instructions: |
  # role
  You are the pipeline dispatcher for the goose-cli video transcription recipe.
  Run the pipeline script and report results.

  # steps
  1. Run the pipeline script on rocm-aibox:
     ```
     ssh rocm-aibox "bash ~/code/projects/goose-cli-video-transcription-recipe/scripts/transcribe-headless.sh '{{ video_url }}' {{ model_size }}"
     ```
  2. Wait for it to complete. Progress logs:
     - `[pipeline] stage 0/4: media-extract` — yt-dlp download + ffmpeg audio/frames
     - `[pipeline] stage 1/4: whisper` — GPU transcription
     - `[pipeline] stage 2/4: vision` — Instella-VL-1B frame analysis
     - `[pipeline] stage 3/4: merge` — timestamp correlation, write combined doc
     - `[pipeline] stage 4/4: narrative` — Ollama narrative generation
  3. Capture the final output lines:
     - `[pipeline] combined:   ~/video-transcripts/<slug>/transcripts/<base>-combined.md`
     - `[pipeline] narrative:  ~/video-transcripts/narratives/<content-title>.md`
  4. Report back with:
     - the per-video slug and base prefix
     - full path to combined.md and the narrative
     - brief summary of what the video covered (from the narrative)

  # narrowing
  Do not modify any files. Do not re-run stages that already completed.
  If the script fails at a stage, report the error verbatim — do not retry.

parameters:
  - key: video_url
    input_type: string
    requirement: required
    description: URL of the video to transcribe (YouTube or any yt-dlp source)
  - key: model_size
    input_type: string
    requirement: optional
    default: medium
    description: "whisper model size: tiny | base | small | medium | large"

extensions:
  - type: builtin
    name: developer
    timeout: 1800

settings:
  goose_provider: openai
  goose_model: llama3.1:8b
  temperature: 0.1

prompt: |
  Transcribe and analyze this video: {{ video_url }}
  Whisper model: {{ model_size }}
  Run the full pipeline and report the output paths and a brief summary.
